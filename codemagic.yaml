workflows:
  android-apk-workflow:
    name: Android APK Derleyici
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      groups:
        - android-signing
      vars:
        PACKAGE_NAME: "com.example.wpzamanlayici"
      node: latest
    triggering:
      events:
        - push
    scripts:
      - name: Android Projesini Derle
        script: |
          cd app
          gradle assembleRelease
    artifacts:
      - app/app/build/outputs/apk/release/*.apk
