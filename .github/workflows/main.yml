name: Android APK Derleyici

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodları Çek
      uses: actions/checkout@v4

    - name: Java Kurulumu (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Küresel Gradle Kurulumu
      uses: gradle/actions/setup-gradle@v4

    - name: APK Derle (Release)
      run: |
        gradle assembleRelease

    - name: APK Dosyasını Çıkart
      uses: actions/upload-artifact@v4
      with:
        name: wp-zamanlayici-apk
        path: "**/build/outputs/apk/release/*.apk"
